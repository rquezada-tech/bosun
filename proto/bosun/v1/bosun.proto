//! Shared protobuf definitions for Bosun gRPC API.
//!
//! This proto file is compiled by tonic-build during build.
//! Service methods are split across the two crates:
//!   - Server implementation: crates/bosun-daemon/src/server/
//!   - Client usage:         crates/bosun/src/api/
//!
//! Design principle: keep the API minimal. Every call
//! should return actionable data, not dashboard fluff.

syntax = "proto3";

package bosun.v1;

// --- Core entities ---

message App {
    string name = 1;
    AppStatus status = 2;
    optional string domain = 3;
    optional uint32 port = 4;
    optional uint32 instances = 5;
    repeated string env_keys = 6;
    uint32 restart_count = 7;
}

enum AppStatus {
    APP_STATUS_UNKNOWN = 0;
    APP_STATUS_RUNNING = 1;
    APP_STATUS_STOPPED = 2;
    APP_STATUS_DEPLOYING = 3;
    APP_STATUS_FAILED = 4;
}

message AppMetric {
    string app_name = 1;
    double cpu_percent = 2;
    uint64 ram_bytes = 3;
    uint64 net_rx_bytes = 4;
    uint64 net_tx_bytes = 5;
    uint64 timestamp_unix = 6;
}

enum DeployStrategy {
    DEPLOY_STRATEGY_DIRECT = 0;
    DEPLOY_STRATEGY_ROLLING = 1;
    DEPLOY_STRATEGY_BLUE_GREEN = 2;
}

message DeployRequest {
    string context_path = 1;      // path on server (already uploaded)
    optional string domain = 2;
    bool enable_ssl = 3;
    map<string, string> env = 4;
    optional uint32 port = 5;
    DeployStrategy strategy = 6;
    repeated string pre_hooks = 7;   // shell commands to run before build
    repeated string post_hooks = 8;  // shell commands to run after deploy + health check
}

message DeployResponse {
    string app_name = 1;
    string status = 2;
}

message LogEntry {
    uint64 timestamp_unix = 1;
    string message = 2;
    // stream: stdout | stderr
    string stream = 3;
}

// --- Auth messages ---

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
    string username = 2;
    string role = 3;
}

message UserInfo {
    string username = 1;
    string role = 2;
}

message ListUsersRequest {}

message ListUsersResponse {
    repeated UserInfo users = 1;
}

message CreateUserRequest {
    string username = 1;
    string password = 2;
    string role = 3;
}

message CreateUserResponse {}

message DeleteUserRequest {
    string username = 1;
}

message DeleteUserResponse {}

// --- Security messages ---

message SecurityStatus {
    string engine = 1;
    uint64 attacks_blocked = 2;
    uint64 active_bans = 3;
}

message SecurityDecision {
    string ip = 1;
    string reason = 2;
    string action = 3;
    uint64 expires_unix = 4;
}

message GetSecurityStatusRequest {}
message GetSecurityStatusResponse {
    SecurityStatus status = 1;
}

message GetSecurityDecisionsRequest {}
message GetSecurityDecisionsResponse {
    repeated SecurityDecision decisions = 1;
}

// --- Services ---

service Bosun {
    // App management
    rpc ListApps(ListAppsRequest) returns (ListAppsResponse);
    rpc GetAppLogs(GetAppLogsRequest) returns (stream LogEntry);
    rpc RestartApp(RestartAppRequest) returns (RestartAppResponse);
    rpc ScaleApp(ScaleAppRequest) returns (ScaleAppResponse);

    // Deployment
    rpc Deploy(DeployRequest) returns (DeployResponse);
    rpc RollbackApp(RollbackAppRequest) returns (RollbackAppResponse);

    // Metrics
    rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
    rpc StreamMetrics(GetMetricsRequest) returns (stream AppMetric);

    // Environment
    rpc GetEnv(GetEnvRequest) returns (GetEnvResponse);
    rpc SetEnv(SetEnvRequest) returns (SetEnvResponse);
    rpc UnsetEnv(UnsetEnvRequest) returns (UnsetEnvResponse);

    // One-click app templates
    rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);

    // Authentication
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

    // Backup & Restore
    rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);
    rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse);
    rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);

    // Security
    rpc GetSecurityStatus(GetSecurityStatusRequest) returns (GetSecurityStatusResponse);
    rpc GetSecurityDecisions(GetSecurityDecisionsRequest) returns (GetSecurityDecisionsResponse);

    // Gateway (APISIX)
    rpc GetGatewayStatus(GetGatewayStatusRequest) returns (GetGatewayStatusResponse);
    rpc ListGatewayRoutes(ListGatewayRoutesRequest) returns (ListGatewayRoutesResponse);
    rpc EnableGatewayPlugin(EnableGatewayPluginRequest) returns (EnableGatewayPluginResponse);
    rpc DisableGatewayPlugin(DisableGatewayPluginRequest) returns (DisableGatewayPluginResponse);
    rpc GetGatewayCacheStats(GetGatewayCacheStatsRequest) returns (GetGatewayCacheStatsResponse);
    rpc PurgeGatewayCache(PurgeGatewayCacheRequest) returns (PurgeGatewayCacheResponse);
    rpc GetGatewayMetrics(GetGatewayMetricsRequest) returns (GetGatewayMetricsResponse);
}

// --- Request / Response messages ---

message ListAppsRequest {}
message ListAppsResponse {
    repeated App apps = 1;
}

message GetAppLogsRequest {
    string app_name = 1;
    bool follow = 2;
    uint32 tail_lines = 3;
}
// returns stream LogEntry

message RestartAppRequest {
    string app_name = 1;
}
message RestartAppResponse {}

message ScaleAppRequest {
    string app_name = 1;
    uint32 instances = 2;
}
message ScaleAppResponse {}

message GetMetricsRequest {
    // empty = all apps; set app_name for a single app
    optional string app_name = 1;
    bool live = 2;
}
message GetMetricsResponse {
    repeated AppMetric metrics = 1;
}

message RollbackAppRequest {
    string app_name = 1;
}
message RollbackAppResponse {
    string status = 1;
    string message = 2;
}

message GetEnvRequest {
    string app_name = 1;
}
message GetEnvResponse {
    map<string, string> env = 1;
}

message SetEnvRequest {
    string app_name = 1;
    string key = 2;
    string value = 3;
}
message SetEnvResponse {}

message UnsetEnvRequest {
    string app_name = 1;
    string key = 2;
}
message UnsetEnvResponse {}

// --- Backup messages ---

message BackupInfo {
    string id = 1;
    string app_name = 2;
    uint64 timestamp_unix = 3;
    uint64 size_bytes = 4;
}

message CreateBackupRequest {
    string app_name = 1;
}

message CreateBackupResponse {
    BackupInfo backup = 1;
}

message ListBackupsRequest {
    optional string app_name = 1;
}

message ListBackupsResponse {
    repeated BackupInfo backups = 1;
}

message RestoreBackupRequest {
    string backup_id = 1;
}

message RestoreBackupResponse {
    string app_name = 1;
    string status = 2;
}

// --- Template messages ---

message TemplateInfo {
    string name = 1;
    string description = 2;
    string category = 3;
    uint32 default_port = 4;
    repeated string versions = 5;
    string icon = 6;
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
    repeated TemplateInfo templates = 1;
}

// --- Gateway (APISIX) messages ---

message GatewayStatus {
    bool enabled = 1;
    string version = 2;
    string uptime = 3;
}

message GatewayRoute {
    string name = 1;
    string domain = 2;
    uint32 port = 3;
    repeated string plugins = 4;
    string uri = 5;
}

message GatewayCacheStats {
    string app_name = 1;
    uint64 hits = 2;
    uint64 misses = 3;
    uint64 size_bytes = 4;
}

message GetGatewayStatusRequest {}
message GetGatewayStatusResponse {
    GatewayStatus status = 1;
}

message ListGatewayRoutesRequest {}
message ListGatewayRoutesResponse {
    repeated GatewayRoute routes = 1;
}

message EnableGatewayPluginRequest {
    string app_name = 1;
    string plugin_name = 2;
    // JSON config string for the plugin
    string config_json = 3;
}
message EnableGatewayPluginResponse {}

message DisableGatewayPluginRequest {
    string app_name = 1;
    string plugin_name = 2;
}
message DisableGatewayPluginResponse {}

message GetGatewayCacheStatsRequest {
    string app_name = 1;
}
message GetGatewayCacheStatsResponse {
    GatewayCacheStats stats = 1;
}

message PurgeGatewayCacheRequest {
    string app_name = 1;
}
message PurgeGatewayCacheResponse {}

message GetGatewayMetricsRequest {}
message GetGatewayMetricsResponse {
    // Raw Prometheus metrics text
    string metrics_text = 1;
}
