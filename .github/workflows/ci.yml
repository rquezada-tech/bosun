name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "300"
  CARGO_NET_RETRY: "3"
  RUST_BACKTRACE: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Check (fastest feedback) ────────────────────────────────────────────────
  check:
    name: Check (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-check-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-check-

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: cargo check --workspace
        run: cargo check --workspace

  # ── Format ───────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

  # ── Lint ─────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-clippy-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-clippy-

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: cargo clippy --workspace
        run: cargo clippy --workspace -- -D warnings

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-test-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-test-

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: cargo test --workspace
        run: cargo test --workspace

  # ── Integration tests (requires Docker) ─────────────────────────────────────
  integration:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: [check]
    services:
      docker:
        image: docker:27-dind
        options: --privileged
        ports:
          - 2375:2375
    env:
      DOCKER_HOST: tcp://localhost:2375
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-integration-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-integration-

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Wait for Docker daemon
        run: |
          for i in $(seq 1 30); do
            if docker info &>/dev/null; then
              echo "Docker is ready."
              break
            fi
            echo "Waiting for Docker... ($i/30)"
            sleep 2
          done
          docker info

      - name: Run integration tests
        run: cargo test --workspace -- --ignored --test-threads=1
        continue-on-error: true  # integration tests may fail if docker-in-docker isn't fully ready

  # ── Build release binaries ──────────────────────────────────────────────────
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-release-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-release-

      - name: Install protobuf compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Strip binaries
        run: strip target/release/bosun target/release/bosun-daemon

      - name: Upload bosun (CLI)
        uses: actions/upload-artifact@v4
        with:
          name: bosun-linux-x86_64
          path: target/release/bosun

      - name: Upload bosun-daemon
        uses: actions/upload-artifact@v4
        with:
          name: bosun-daemon-linux-x86_64
          path: target/release/bosun-daemon

  # ── Lint install script with shellcheck ────────────────────────────────────
  shellcheck:
    name: ShellCheck (install.sh + uninstall.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          additional_files: ''
        env:
          SHELLCHECK_OPTS: -e SC1091  # skip "not sourced" warnings for /etc/os-release
